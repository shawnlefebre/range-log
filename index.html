<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Range Log">
<title>Range Log</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0e0e0e;
    --surface: #1a1a1a;
    --surface2: #242424;
    --surface3: #2e2e2e;
    --border: #333;
    --accent: #c8a84b;
    --accent-dim: #8a7030;
    --danger: #c0392b;
    --warn: #e67e22;
    --ok: #27ae60;
    --text: #e8e8e8;
    --text-muted: #888;
    --text-dim: #555;
    --radius: 6px;
    --font-display: 'Bebas Neue', sans-serif;
    --font-mono: 'IBM Plex Mono', monospace;
    --font-body: 'IBM Plex Sans', sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-body);
    min-height: 100vh;
    font-size: 15px;
    -webkit-font-smoothing: antialiased;
  }

  /* LAYOUT */
  #app { max-width: 720px; margin: 0 auto; padding: 0 0 80px; }

  header {
    background: var(--surface);
    border-bottom: 2px solid var(--accent);
    padding: 16px 20px 12px;
    position: sticky;
    top: 0;
    z-index: 100;
    display: flex;
    align-items: baseline;
    gap: 12px;
  }
  header h1 {
    font-family: var(--font-display);
    font-size: 2rem;
    color: var(--accent);
    letter-spacing: 2px;
    line-height: 1;
  }
  header span {
    font-family: var(--font-mono);
    font-size: 0.7rem;
    color: var(--text-dim);
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  /* NAV TABS */
  nav {
    display: flex;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 57px;
    z-index: 99;
  }
  nav button {
    flex: 1;
    padding: 12px 8px;
    background: none;
    border: none;
    color: var(--text-muted);
    font-family: var(--font-mono);
    font-size: 0.72rem;
    letter-spacing: 1px;
    text-transform: uppercase;
    cursor: pointer;
    border-bottom: 2px solid transparent;
    transition: all 0.15s;
  }
  nav button.active {
    color: var(--accent);
    border-bottom-color: var(--accent);
  }
  nav button:hover:not(.active) { color: var(--text); }

  /* SECTIONS */
  section { display: none; padding: 20px; }
  section.active { display: block; }

  /* CARDS */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px;
    margin-bottom: 12px;
  }
  .card-title {
    font-family: var(--font-mono);
    font-size: 0.7rem;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 12px;
  }

  /* FIREARM CARDS */
  .gun-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px 16px;
    margin-bottom: 10px;
    display: grid;
    grid-template-columns: 1fr auto;
    gap: 4px 16px;
    align-items: center;
  }
  .gun-card.warn-clean { border-left: 3px solid var(--warn); }
  .gun-card.needs-clean { border-left: 3px solid var(--danger); }
  .gun-card.clean { border-left: 3px solid var(--ok); }

  .gun-name {
    font-family: var(--font-mono);
    font-size: 0.95rem;
    font-weight: 600;
    color: var(--text);
  }
  .gun-caliber {
    font-family: var(--font-mono);
    font-size: 0.7rem;
    color: var(--accent);
    letter-spacing: 1px;
  }
  .gun-stats {
    font-family: var(--font-mono);
    font-size: 0.72rem;
    color: var(--text-muted);
    margin-top: 4px;
  }
  .gun-stats span { color: var(--text); }
  .clean-status {
    font-family: var(--font-mono);
    font-size: 0.65rem;
    letter-spacing: 1px;
    text-transform: uppercase;
    text-align: right;
  }
  .clean-status.ok { color: var(--ok); }
  .clean-status.warn { color: var(--warn); }
  .clean-status.due { color: var(--danger); }

  .gun-total {
    font-family: var(--font-display);
    font-size: 2rem;
    color: var(--accent);
    line-height: 1;
    text-align: right;
  }
  .gun-total-label {
    font-family: var(--font-mono);
    font-size: 0.6rem;
    color: var(--text-dim);
    text-align: right;
    letter-spacing: 1px;
  }

  .gun-card-actions {
    grid-column: 1 / -1;
    margin-top: 8px;
    display: flex;
    gap: 8px;
  }
  .btn-clean {
    flex: 1;
    background: none;
    border: 1px solid var(--border);
    color: var(--text-muted);
    padding: 6px 12px;
    border-radius: var(--radius);
    font-family: var(--font-mono);
    font-size: 0.68rem;
    letter-spacing: 1px;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.15s;
  }
  .btn-clean:hover { border-color: var(--ok); color: var(--ok); }

  /* CLEANING HISTORY */
  .cleaning-row {
    display: grid;
    grid-template-columns: auto 1fr auto;
    gap: 12px;
    align-items: center;
    padding: 10px 12px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    margin-bottom: 6px;
  }
  .cleaning-type-badge {
    font-family: var(--font-mono);
    font-size: 0.62rem;
    letter-spacing: 1px;
    text-transform: uppercase;
    padding: 3px 8px;
    border-radius: 3px;
    background: var(--surface3);
  }
  .cleaning-type-badge.quick { background: #2c3e50; color: #5dade2; }
  .cleaning-type-badge.deep { background: #1e3a1e; color: #5fbf5f; }
  .cleaning-type-badge.detail { background: #3a1e1e; color: #d4a8a8; }
  .cleaning-type-badge.zero { background: #3a2e1e; color: #d4b86a; }
  .cleaning-meta {
    font-family: var(--font-mono);
    font-size: 0.75rem;
  }
  .cleaning-meta-date { color: var(--text); }
  .cleaning-meta-notes { color: var(--text-muted); font-size: 0.7rem; margin-top: 2px; }
  .history-subsection {
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-family: var(--font-mono);
    font-size: 0.7rem;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--text-muted);
    margin: 16px 0 8px;
    padding-bottom: 4px;
    border-bottom: 1px solid var(--border);
  }
  .btn-mini {
    background: none;
    border: 1px solid var(--border);
    color: var(--text-muted);
    padding: 3px 10px;
    border-radius: var(--radius);
    font-family: var(--font-mono);
    font-size: 0.62rem;
    letter-spacing: 1px;
    text-transform: uppercase;
    cursor: pointer;
  }
  .btn-mini:hover { border-color: var(--accent); color: var(--accent); }

  /* SESSIONS */
  .session-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px 16px;
    margin-bottom: 10px;
  }
  .session-header {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 8px;
  }
  .session-date {
    font-family: var(--font-mono);
    font-size: 0.8rem;
    color: var(--accent);
    font-weight: 600;
  }
  .session-location {
    font-family: var(--font-mono);
    font-size: 0.68rem;
    color: var(--text-muted);
    letter-spacing: 1px;
  }
  .session-total {
    font-family: var(--font-display);
    font-size: 1.4rem;
    color: var(--text);
  }
  .session-rounds {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-top: 6px;
  }
  .session-gun-pill {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 3px 10px;
    font-family: var(--font-mono);
    font-size: 0.68rem;
    color: var(--text-muted);
  }
  .session-gun-pill span { color: var(--text); }
  .session-notes {
    margin-top: 8px;
    font-size: 0.8rem;
    color: var(--text-muted);
    font-style: italic;
    border-top: 1px solid var(--border);
    padding-top: 6px;
  }

  /* FORMS */
  .form-group { margin-bottom: 14px; }
  label {
    display: block;
    font-family: var(--font-mono);
    font-size: 0.68rem;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 6px;
  }
  input, select, textarea {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text);
    font-family: var(--font-body);
    font-size: 0.95rem;
    padding: 10px 12px;
    outline: none;
    transition: border-color 0.15s;
    -webkit-appearance: none;
    appearance: none;
  }
  input:focus, select:focus, textarea:focus { border-color: var(--accent); }
  textarea { min-height: 70px; resize: vertical; }

  /* GUN ROUND INPUTS IN SESSION */
  .gun-row {
    display: flex;
    align-items: center;
    gap: 10px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 10px 12px;
    margin-bottom: 8px;
  }
  .gun-row label {
    flex: 1;
    margin: 0;
    text-transform: none;
    letter-spacing: 0;
    font-size: 0.85rem;
    color: var(--text);
  }
  .gun-row .caliber-tag {
    font-size: 0.65rem;
    color: var(--accent);
    letter-spacing: 1px;
  }
  .gun-row input[type=number] {
    width: 80px;
    text-align: right;
    padding: 6px 10px;
    font-family: var(--font-mono);
    font-size: 1rem;
  }

  /* BUTTONS */
  .btn {
    display: inline-block;
    padding: 12px 20px;
    border-radius: var(--radius);
    font-family: var(--font-mono);
    font-size: 0.75rem;
    letter-spacing: 1px;
    text-transform: uppercase;
    cursor: pointer;
    border: none;
    transition: all 0.15s;
  }
  .btn-primary {
    background: var(--accent);
    color: #0e0e0e;
    font-weight: 600;
    width: 100%;
    text-align: center;
  }
  .btn-primary:hover { background: #d4b55a; }
  .btn-secondary {
    background: none;
    border: 1px solid var(--border);
    color: var(--text-muted);
  }
  .btn-secondary:hover { border-color: var(--text-muted); color: var(--text); }
  .btn-danger {
    background: none;
    border: 1px solid var(--danger);
    color: var(--danger);
  }
  .btn-row {
    display: flex;
    gap: 10px;
    margin-top: 8px;
  }
  .btn-row .btn { flex: 1; text-align: center; }

  /* SETTINGS LISTS */
  .list-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 14px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    margin-bottom: 8px;
  }
  .list-item-text { flex: 1; }
  .list-item-name { font-size: 0.9rem; font-weight: 500; }
  .list-item-sub { font-family: var(--font-mono); font-size: 0.68rem; color: var(--text-muted); margin-top: 2px; }
  .btn-icon {
    background: none;
    border: none;
    color: var(--text-muted);
    cursor: pointer;
    padding: 4px 8px;
    font-size: 1.1rem;
    border-radius: var(--radius);
    transition: color 0.15s;
  }
  .btn-icon:hover { color: var(--danger); }

  .reorder-controls {
    display: flex;
    flex-direction: column;
    gap: 2px;
    margin-right: 4px;
  }
  .reorder-btn {
    padding: 2px 6px;
    font-size: 0.7rem;
    line-height: 1;
    color: var(--text-muted);
  }
  .reorder-btn:hover:not(:disabled) { color: var(--accent); }
  .reorder-btn:disabled { opacity: 0.25; cursor: not-allowed; }

  /* AMMO */
  .ammo-filters {
    display: flex;
    gap: 10px;
    margin: 14px 0 12px;
  }
  .ammo-filter-group { flex: 1; }
  .filter-label {
    display: block;
    font-family: var(--font-mono);
    font-size: 0.6rem;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--text-dim);
    margin-bottom: 4px;
  }
  .ammo-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 12px 14px;
    margin-bottom: 8px;
  }
  .ammo-card.used-up { opacity: 0.5; }
  .ammo-card-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 10px;
    margin-bottom: 6px;
  }
  .ammo-caliber-badge {
    font-family: var(--font-mono);
    font-size: 0.7rem;
    letter-spacing: 1px;
    color: var(--accent);
    text-transform: uppercase;
  }
  .ammo-name {
    font-size: 0.92rem;
    font-weight: 500;
    color: var(--text);
    margin-top: 2px;
  }
  .ammo-cpr {
    font-family: var(--font-display);
    font-size: 1.6rem;
    color: var(--accent);
    line-height: 1;
    text-align: right;
  }
  .ammo-cpr-label {
    font-family: var(--font-mono);
    font-size: 0.6rem;
    color: var(--text-dim);
    letter-spacing: 1px;
    text-align: right;
    text-transform: uppercase;
  }
  .ammo-meta {
    font-family: var(--font-mono);
    font-size: 0.72rem;
    color: var(--text-muted);
    display: flex;
    flex-wrap: wrap;
    gap: 4px 10px;
    margin-top: 6px;
  }
  .ammo-meta span { color: var(--text); }
  .ammo-status-pill {
    display: inline-block;
    font-family: var(--font-mono);
    font-size: 0.6rem;
    letter-spacing: 1px;
    text-transform: uppercase;
    padding: 2px 7px;
    border-radius: 3px;
    background: #1e3a1e;
    color: #5fbf5f;
  }
  .ammo-status-pill.usedup {
    background: #3a2e2e;
    color: #a99393;
  }
  .ammo-actions {
    display: flex;
    gap: 6px;
    margin-top: 8px;
    padding-top: 8px;
    border-top: 1px solid var(--border);
  }
  .ammo-actions button { flex: 1; }
  .ammo-notes {
    margin-top: 6px;
    font-size: 0.78rem;
    color: var(--text-muted);
    font-style: italic;
  }
  .ammo-stat-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 8px;
    margin-bottom: 8px;
  }
  @media (min-width: 480px) {
    .ammo-stat-grid { grid-template-columns: repeat(4, 1fr); }
  }
  .ammo-stat-box {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 10px;
    text-align: center;
  }
  .ammo-stat-num {
    font-family: var(--font-display);
    font-size: 1.3rem;
    color: var(--accent);
    line-height: 1;
  }
  .ammo-stat-label {
    font-family: var(--font-mono);
    font-size: 0.55rem;
    color: var(--text-dim);
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-top: 4px;
  }

  /* SECTION HEADERS */
  .section-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 16px;
  }
  .section-title {
    font-family: var(--font-display);
    font-size: 1.5rem;
    color: var(--text);
    letter-spacing: 1px;
  }

  /* MODAL */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.75);
    z-index: 200;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-top: 2px solid var(--accent);
    border-radius: var(--radius);
    padding: 20px;
    width: 100%;
    max-width: 480px;
    max-height: 90vh;
    overflow-y: auto;
  }
  .modal-title {
    font-family: var(--font-display);
    font-size: 1.4rem;
    color: var(--accent);
    letter-spacing: 1px;
    margin-bottom: 16px;
  }

  /* PROGRESS BAR */
  .clean-bar {
    height: 3px;
    background: var(--surface3);
    border-radius: 2px;
    margin-top: 6px;
    overflow: hidden;
  }
  .clean-bar-fill {
    height: 100%;
    border-radius: 2px;
    transition: width 0.3s;
  }

  /* SUMMARY STATS */
  .stats-row {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    margin-bottom: 16px;
  }
  .stat-box {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 12px;
    text-align: center;
  }
  .stat-number {
    font-family: var(--font-display);
    font-size: 1.8rem;
    color: var(--accent);
    line-height: 1;
  }
  .stat-label {
    font-family: var(--font-mono);
    font-size: 0.6rem;
    color: var(--text-dim);
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-top: 4px;
  }

  .empty-state {
    text-align: center;
    padding: 40px 20px;
    color: var(--text-dim);
    font-family: var(--font-mono);
    font-size: 0.8rem;
    letter-spacing: 1px;
  }

  /* Data schema version badge */
  .schema-badge {
    font-family: var(--font-mono);
    font-size: 0.6rem;
    color: var(--text-dim);
    letter-spacing: 1px;
    text-align: center;
    padding: 12px;
  }

  @media (max-width: 480px) {
    .stats-row { grid-template-columns: repeat(3, 1fr); }
    .stat-number { font-size: 1.4rem; }
  }
</style>
</head>
<body>
<div id="app">
  <header>
    <h1>RANGE LOG</h1>
    <span id="app-version">v4.1</span>
  </header>
  <nav>
    <button class="active" onclick="showTab('dashboard')">Dashboard</button>
    <button onclick="showTab('log')">Log Session</button>
    <button onclick="showTab('sessions')">Sessions</button>
    <button onclick="showTab('ammo')">Ammo</button>
    <button onclick="showTab('settings')">Settings</button>
  </nav>

  <!-- DASHBOARD -->
  <section id="tab-dashboard" class="active">
    <div class="stats-row" id="summary-stats"></div>
    <div class="card-title" style="padding:0 0 8px;">Firearms — Round Count & Clean Status</div>
    <div id="gun-cards"></div>
  </section>

  <!-- LOG SESSION -->
  <section id="tab-log">
    <div class="section-header">
      <div class="section-title">Log Session</div>
    </div>
    <div class="card">
      <div class="form-group">
        <label>Date</label>
        <input type="date" id="session-date">
      </div>
      <div class="form-group">
        <label>Location</label>
        <select id="session-location">
          <option value="">— Select location —</option>
        </select>
      </div>
      <div class="form-group">
        <label>Rounds fired per firearm</label>
        <div id="gun-inputs"></div>
      </div>
      <div class="form-group">
        <label>Notes (optional)</label>
        <textarea id="session-notes" placeholder="Anything worth remembering..."></textarea>
      </div>
      <button class="btn btn-primary" onclick="saveSession()">Save Session</button>
    </div>
  </section>

  <!-- SESSIONS -->
  <section id="tab-sessions">
    <div class="section-header">
      <div class="section-title">All Sessions</div>
    </div>
    <div id="sessions-list"></div>
  </section>

  <!-- AMMO -->
  <section id="tab-ammo">
    <div class="section-header">
      <div class="section-title">Ammo Log</div>
      <button class="btn btn-secondary" onclick="openAddAmmo()">+ Log Purchase</button>
    </div>
    <div id="ammo-stats"></div>
    <div class="ammo-filters">
      <div class="ammo-filter-group">
        <label class="filter-label">Caliber</label>
        <select id="ammo-filter-caliber" onchange="renderAmmo()">
          <option value="">All calibers</option>
        </select>
      </div>
      <div class="ammo-filter-group">
        <label class="filter-label">Stock</label>
        <select id="ammo-filter-stock" onchange="renderAmmo()">
          <option value="instock" selected>In stock only</option>
          <option value="all">All (incl. used up)</option>
        </select>
      </div>
    </div>
    <div id="ammo-list"></div>
  </section>

  <!-- SETTINGS -->
  <section id="tab-settings">
    <div class="section-header">
      <div class="section-title">Firearms</div>
      <button class="btn btn-secondary" onclick="openAddGun()">+ Add</button>
    </div>
    <div id="guns-settings-list"></div>

<script>
// ── DATA SCHEMA v4 ──────────────────────────────────────────────
// v1: lastCleaned (single date) per gun
// v2: cleanings array per gun, each {id, date, type, notes}
//     type: 'quick' | 'deep' | 'detail'
//     deep & detail reset the deep-clean counter; quick does not
// v3: zeros array per gun, each {id, date, distance, distanceUnit, ammo, optic, notes}
// v4: top-level ammo array, each {id, date, caliber, manufacturer, model, quantity, totalPrice, notes}
const SCHEMA_VERSION = 4;

const CLEANING_TYPES = {
  quick: { label: 'Quick', resetsDeep: false },
  deep: { label: 'Deep', resetsDeep: true },
  detail: { label: 'Detail strip', resetsDeep: true },
};

const DEFAULT_DATA = {
  schemaVersion: SCHEMA_VERSION,
  firearms: [
    { id: 'g1', name: 'Example Pistol', caliber: '9mm', cleanThreshold: 500, totalRounds: 0, cleanings: [], zeros: [] },
  ],
  locations: [
    { id: 'l1', name: 'Example Range' },
  ],
  sellers: [
    { id: 's1', name: 'Example Store' },
  ],
  sessions: [],
  ammo: []
};

// ── STORAGE ──────────────────────────────────────────────────────
function load() {
  const raw = localStorage.getItem('rangeLogData');
  if (!raw) return JSON.parse(JSON.stringify(DEFAULT_DATA));
  try {
    const d = JSON.parse(raw);
    return migrateData(d);
  } catch { return JSON.parse(JSON.stringify(DEFAULT_DATA)); }
}

function migrateData(d) {
  if (!d.schemaVersion) d.schemaVersion = 1;

  // v1 -> v2: convert lastCleaned date to a 'deep' cleaning entry
  if (d.schemaVersion === 1) {
    d.firearms.forEach(gun => {
      if (!Array.isArray(gun.cleanings)) gun.cleanings = [];
      if (gun.lastCleaned) {
        // Migrate the single lastCleaned date as a Deep cleaning
        gun.cleanings.push({
          id: uid(),
          date: gun.lastCleaned,
          type: 'deep',
          notes: ''
        });
      }
      // Drop now-obsolete fields
      delete gun.lastCleaned;
      delete gun.roundsSinceClean;
    });
    d.schemaVersion = 2;
  }

  // v2 -> v3: add zeros array to each firearm
  if (d.schemaVersion === 2) {
    d.firearms.forEach(gun => {
      if (!Array.isArray(gun.zeros)) gun.zeros = [];
    });
    d.schemaVersion = 3;
  }

  // v3 -> v4: add top-level ammo array
  if (d.schemaVersion === 3) {
    if (!Array.isArray(d.ammo)) d.ammo = [];
    d.schemaVersion = 4;
  }

  // Defensive: ensure every gun has cleanings + zeros arrays, and ammo + sellers exist
  d.firearms.forEach(gun => {
    if (!Array.isArray(gun.cleanings)) gun.cleanings = [];
    if (!Array.isArray(gun.zeros)) gun.zeros = [];
  });
  if (!Array.isArray(d.ammo)) d.ammo = [];
  if (!Array.isArray(d.sellers)) d.sellers = [];

  return d;
}

function save(d) {
  localStorage.setItem('rangeLogData', JSON.stringify(d));
}

let data = load();

// ── UTILS ─────────────────────────────────────────────────────────
function uid() { return 'id_' + Date.now() + '_' + Math.random().toString(36).slice(2,7); }
function today() { return new Date().toISOString().slice(0,10); }
function fmtDate(d) {
  if (!d) return '';
  const [y,m,day] = d.split('-');
  const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return `${months[+m-1]} ${+day}, ${y}`;
}
function totalRoundsAll() { return data.firearms.reduce((s,g) => s + (g.totalRounds||0), 0); }
function totalSessions() { return data.sessions.length; }

// Last deep clean = most recent cleaning whose type resets deep counter (deep or detail)
function lastDeepCleanDate(gun) {
  const resets = (gun.cleanings || []).filter(c => CLEANING_TYPES[c.type]?.resetsDeep);
  if (!resets.length) return null;
  return resets.reduce((latest, c) => c.date > latest ? c.date : latest, resets[0].date);
}

// Rounds since clean = sum of session rounds for this gun where session.date > lastDeepCleanDate
// Same-day sessions don't count (assumes you cleaned after shooting)
function computeRoundsSinceClean(gun) {
  const lastClean = lastDeepCleanDate(gun);
  if (!lastClean) {
    // Never deep cleaned — count all rounds
    return data.sessions.reduce((sum, s) => {
      const r = s.rounds && typeof s.rounds === 'object' ? s.rounds[gun.id] || 0 : 0;
      return sum + r;
    }, 0);
  }
  return data.sessions.reduce((sum, s) => {
    if (s.date <= lastClean) return sum;
    const r = s.rounds && typeof s.rounds === 'object' ? s.rounds[gun.id] || 0 : 0;
    return sum + r;
  }, 0);
}

function cleanStatus(gun) {
  const rsc = computeRoundsSinceClean(gun);
  const pct = gun.cleanThreshold > 0 ? rsc / gun.cleanThreshold : 0;
  if (pct >= 1) return { label: 'CLEAN NOW', cls: 'due', barColor: '#c0392b', pct: 1, rsc };
  if (pct >= 0.75) return { label: `${rsc} / ${gun.cleanThreshold}`, cls: 'warn', barColor: '#e67e22', pct, rsc };
  return { label: `${rsc} / ${gun.cleanThreshold}`, cls: 'ok', barColor: '#27ae60', pct, rsc };
}

// ── RENDER DASHBOARD ──────────────────────────────────────────────
function renderDashboard() {
  const stats = document.getElementById('summary-stats');
  stats.innerHTML = `
    <div class="stat-box">
      <div class="stat-number">${totalRoundsAll().toLocaleString()}</div>
      <div class="stat-label">Total Rounds</div>
    </div>
    <div class="stat-box">
      <div class="stat-number">${totalSessions()}</div>
      <div class="stat-label">Sessions</div>
    </div>
    <div class="stat-box">
      <div class="stat-number">${data.firearms.length}</div>
      <div class="stat-label">Firearms</div>
    </div>
  `;

  const cards = document.getElementById('gun-cards');
  if (!data.firearms.length) {
    cards.innerHTML = '<div class="empty-state">No firearms added yet.</div>';
    return;
  }
  cards.innerHTML = data.firearms.map(gun => {
    const cs = cleanStatus(gun);
    const cardCls = cs.pct >= 1 ? 'needs-clean' : cs.pct >= 0.75 ? 'warn-clean' : 'clean';
    const lastDeep = lastDeepCleanDate(gun);
    const lastCleanedStr = lastDeep ? `Last deep clean ${fmtDate(lastDeep)}` : 'No deep clean logged';
    return `
      <div class="gun-card ${cardCls}">
        <div>
          <div class="gun-name">${gun.name}</div>
          <div class="gun-caliber">${gun.caliber}</div>
          <div class="gun-stats">All-time <span>${(gun.totalRounds||0).toLocaleString()} rds</span> &nbsp;·&nbsp; ${lastCleanedStr}</div>
          <div class="clean-bar"><div class="clean-bar-fill" style="width:${Math.min(cs.pct*100,100)}%;background:${cs.barColor}"></div></div>
        </div>
        <div>
          <div class="gun-total">${(gun.totalRounds||0).toLocaleString()}</div>
          <div class="gun-total-label">rounds</div>
          <div class="clean-status ${cs.cls}" style="margin-top:8px;">${cs.label}</div>
        </div>
        <div class="gun-card-actions">
          <button class="btn-clean" onclick="openLogCleaning('${gun.id}')">+ Log Cleaning</button>
          <button class="btn-clean" onclick="openGunHistory('${gun.id}')">View Details</button>
        </div>
      </div>
    `;
  }).join('');
}

// ── RENDER LOG SESSION ────────────────────────────────────────────
function renderLogForm() {
  document.getElementById('session-date').value = today();

  const locSel = document.getElementById('session-location');
  locSel.innerHTML = '<option value="">— Select location —</option>' +
    data.locations.map(l => `<option value="${l.id}">${l.name}</option>`).join('');

  const gunInputs = document.getElementById('gun-inputs');
  gunInputs.innerHTML = data.firearms.map(gun => `
    <div class="gun-row">
      <div>
        <label>${gun.name}</label>
        <div class="caliber-tag">${gun.caliber}</div>
      </div>
      <input type="number" id="rounds-${gun.id}" min="0" placeholder="0" value="">
    </div>
  `).join('');
}

function saveSession() {
  const date = document.getElementById('session-date').value;
  const locId = document.getElementById('session-location').value;
  const notes = document.getElementById('session-notes').value.trim();

  const rounds = {};
  let total = 0;
  data.firearms.forEach(gun => {
    const val = parseInt(document.getElementById('rounds-' + gun.id)?.value || '0', 10) || 0;
    if (val > 0) { rounds[gun.id] = val; total += val; }
  });

  if (!date) { alert('Please select a date.'); return; }
  if (total === 0) { alert('Enter at least one round count.'); return; }

  const session = {
    id: uid(),
    date,
    locationId: locId || null,
    rounds,
    notes,
    totalRounds: total,
    createdAt: new Date().toISOString()
  };

  data.sessions.unshift(session);

  // Update firearm totals only — roundsSinceClean is now computed from session history
  data.firearms.forEach(gun => {
    const r = rounds[gun.id] || 0;
    gun.totalRounds = (gun.totalRounds || 0) + r;
  });

  save(data);
  document.getElementById('session-notes').value = '';
  data.firearms.forEach(gun => {
    const el = document.getElementById('rounds-' + gun.id);
    if (el) el.value = '';
  });

  alert('Session saved!');
  showTab('dashboard');
}

// ── RENDER SESSIONS ───────────────────────────────────────────────
function renderSessions() {
  const el = document.getElementById('sessions-list');
  if (!data.sessions.length) {
    el.innerHTML = '<div class="empty-state">No sessions logged yet.</div>';
    return;
  }
  const sorted = [...data.sessions].sort((a,b) => b.date.localeCompare(a.date));
  el.innerHTML = sorted.map(s => {
    const loc = data.locations.find(l => l.id === s.locationId);
    const rounds = s.rounds && typeof s.rounds === 'object' ? s.rounds : {};
    const pills = Object.entries(rounds).map(([gid, r]) => {
      const gun = data.firearms.find(g => g.id === gid);
      return `<div class="session-gun-pill">${gun ? gun.name : 'Unknown'} <span>${r}</span></div>`;
    }).join('');
    return `
      <div class="session-card">
        <div class="session-header">
          <div class="session-date">${fmtDate(s.date)}</div>
          <div style="display:flex;align-items:center;gap:10px;">
            <div class="session-total">${s.totalRounds} rds</div>
            <button class="btn-icon" onclick="openEditSession('${s.id}')" title="Edit">✏️</button>
            <button class="btn-icon" onclick="deleteSession('${s.id}')" title="Delete">🗑</button>
          </div>
        </div>
        ${loc ? `<div class="session-location">${loc.name}</div>` : ''}
        <div class="session-rounds">${pills}</div>
        ${s.notes ? `<div class="session-notes">${s.notes}</div>` : ''}
      </div>
    `;
  }).join('');
}

// ── SETTINGS ──────────────────────────────────────────────────────
function renderSettings() {
  const gl = document.getElementById('guns-settings-list');
  gl.innerHTML = data.firearms.map((gun, idx) => {
    const isFirst = idx === 0;
    const isLast = idx === data.firearms.length - 1;
    return `
    <div class="list-item">
      <div class="reorder-controls">
        <button class="btn-icon reorder-btn" onclick="moveGun('${gun.id}', -1)" title="Move up" ${isFirst ? 'disabled' : ''}>▲</button>
        <button class="btn-icon reorder-btn" onclick="moveGun('${gun.id}', 1)" title="Move down" ${isLast ? 'disabled' : ''}>▼</button>
      </div>
      <div class="list-item-text">
        <div class="list-item-name">${gun.name}</div>
        <div class="list-item-sub">${gun.caliber} · Clean every ${gun.cleanThreshold} rds</div>
      </div>
      <button class="btn-icon" onclick="openEditGun('${gun.id}')" title="Edit">✏️</button>
      <button class="btn-icon" onclick="deleteGun('${gun.id}')" title="Delete">🗑</button>
    </div>
    `;
  }).join('') || '<div class="empty-state">No firearms.</div>';

  const ll = document.getElementById('locations-settings-list');
  ll.innerHTML = data.locations.map(loc => `
    <div class="list-item">
      <div class="list-item-text">
        <div class="list-item-name">${loc.name}</div>
      </div>
      <button class="btn-icon" onclick="deleteLocation('${loc.id}')" title="Delete">🗑</button>
    </div>
  `).join('') || '<div class="empty-state">No locations.</div>';

  const sl = document.getElementById('sellers-settings-list');
  const sellers = data.sellers || [];
  sl.innerHTML = sellers.map(seller => `
    <div class="list-item">
      <div class="list-item-text">
        <div class="list-item-name">${seller.name}</div>
      </div>
      <button class="btn-icon" onclick="deleteSeller('${seller.id}')" title="Delete">🗑</button>
    </div>
  `).join('') || '<div class="empty-state">No sellers.</div>';
}

// ── GUN CRUD ──────────────────────────────────────────────────────
function openAddGun() {
  document.getElementById('modal-gun-title').textContent = 'Add Firearm';
  document.getElementById('gun-edit-id').value = '';
  document.getElementById('gun-name').value = '';
  document.getElementById('gun-caliber').value = '';
  document.getElementById('gun-threshold').value = '';
  openModal('modal-gun');
}
function openEditGun(id) {
  const gun = data.firearms.find(g => g.id === id);
  if (!gun) return;
  document.getElementById('modal-gun-title').textContent = 'Edit Firearm';
  document.getElementById('gun-edit-id').value = id;
  document.getElementById('gun-name').value = gun.name;
  document.getElementById('gun-caliber').value = gun.caliber;
  document.getElementById('gun-threshold').value = gun.cleanThreshold;
  openModal('modal-gun');
}
function saveGun() {
  const id = document.getElementById('gun-edit-id').value;
  const name = document.getElementById('gun-name').value.trim();
  const caliber = document.getElementById('gun-caliber').value.trim();
  const threshold = parseInt(document.getElementById('gun-threshold').value, 10);
  if (!name || !caliber || !threshold) { alert('Please fill in name, caliber, and clean threshold.'); return; }
  if (id) {

function moveGun(id, direction) {
  const idx = data.firearms.findIndex(g => g.id === id);
  if (idx < 0) return;
  const newIdx = idx + direction;
  if (newIdx < 0 || newIdx >= data.firearms.length) return;

  data.firearms.splice(newIdx, 0, moved);
  save(data);
  renderSettings();
  renderDashboard();
}

  gunInputs.innerHTML = data.firearms.map(gun => `
    <div class="gun-row">
      <div>
        <label>${gun.name}</label>

      </div>

    </div>
  `).join('');

  openModal('modal-session');
}

function saveEditSession() {
  const id = document.getElementById('session-edit-id').value;
  const s = data.sessions.find(s => s.id === id);
  if (!s) return;

  const date = document.getElementById('session-edit-date').value;
  const locId = document.getElementById('session-edit-location').value;
  const notes = document.getElementById('session-edit-notes').value.trim();

  const newRounds = {};
  let total = 0;
  data.firearms.forEach(gun => {
    const val = parseInt(document.getElementById('edit-rounds-' + gun.id)?.value || '0', 10) || 0;
    if (val > 0) { newRounds[gun.id] = val; total += val; }
  });

  if (!date) { alert('Please select a date.'); return; }
  if (total === 0) { alert('Enter at least one round count.'); return; }

  // Reverse old round counts from firearm totals, apply new ones
  // roundsSinceClean is computed, so no need to track it manually
  const oldRounds = s.rounds && typeof s.rounds === 'object' ? s.rounds : {};
  data.firearms.forEach(gun => {
    const oldR = oldRounds[gun.id] || 0;
    const newR = newRounds[gun.id] || 0;
    const diff = newR - oldR;
    gun.totalRounds = Math.max(0, (gun.totalRounds || 0) + diff);
  });

  s.date = date;
  s.locationId = locId || null;
  s.notes = notes;
  s.rounds = newRounds;
  s.totalRounds = total;

  save(data);
  closeModal('modal-session');
  renderSessions();
  renderDashboard();
}

function deleteSession(id) {
  const s = data.sessions.find(s => s.id === id);
  if (!s) return;
  if (!confirm('Delete this session? Firearm round counts will be adjusted.')) return;

  // Reverse round counts (only totalRounds; roundsSinceClean is computed)
  const delRounds = s.rounds && typeof s.rounds === 'object' ? s.rounds : {};
  data.firearms.forEach(gun => {
    const r = delRounds[gun.id] || 0;
    gun.totalRounds = Math.max(0, (gun.totalRounds || 0) - r);
  });

  data.sessions = data.sessions.filter(s => s.id !== id);
  save(data);
  renderSessions();
  renderDashboard();
}

// ── AMMO RENDER ───────────────────────────────────────────────────
function renderAmmo() {
  const ammo = data.ammo || [];

  // Populate caliber filter dropdown (preserve current selection)
  const calSel = document.getElementById('ammo-filter-caliber');
  const currentCal = calSel.value;
  const calibers = [...new Set(ammo.map(a => a.caliber).filter(Boolean))].sort();
  calSel.innerHTML = '<option value="">All calibers</option>' +
    calibers.map(c => `<option value="${c}"${c === currentCal ? ' selected' : ''}>${c}</option>`).join('');

  const filterCal = calSel.value;
  const filterStock = document.getElementById('ammo-filter-stock').value;

  // Apply filters
  let filtered = ammo;
  if (filterCal) filtered = filtered.filter(a => a.caliber === filterCal);
  if (filterStock === 'instock') filtered = filtered.filter(a => (a.status || 'instock') === 'instock');

  // Stats
  const statsEl = document.getElementById('ammo-stats');
  if (!filtered.length) {
    statsEl.innerHTML = '';
  } else {
    const totalRounds = filtered.reduce((s, a) => s + (a.quantity || 0), 0);
    const totalSpend = filtered.reduce((s, a) => s + (a.totalPrice || 0), 0);
    const cprs = filtered.filter(a => a.quantity > 0).map(a => a.totalPrice / a.quantity);
    const avgCPR = cprs.length ? (cprs.reduce((s, c) => s + c, 0) / cprs.length) : 0;
    const minCPR = cprs.length ? Math.min(...cprs) : 0;
    const maxCPR = cprs.length ? Math.max(...cprs) : 0;
    const rangeStr = cprs.length ? `$${minCPR.toFixed(2)} – $${maxCPR.toFixed(2)}` : '—';
    statsEl.innerHTML = `
      <div class="ammo-stat-grid">
        <div class="ammo-stat-box"><div class="ammo-stat-num">${totalRounds.toLocaleString()}</div><div class="ammo-stat-label">Rounds</div></div>
        <div class="ammo-stat-box"><div class="ammo-stat-num">$${totalSpend.toFixed(2)}</div><div class="ammo-stat-label">Spend</div></div>
        <div class="ammo-stat-box"><div class="ammo-stat-num">$${avgCPR.toFixed(3)}</div><div class="ammo-stat-label">Avg CPR</div></div>
        <div class="ammo-stat-box"><div class="ammo-stat-num" style="font-size:0.85rem;font-family:var(--font-mono);">${rangeStr}</div><div class="ammo-stat-label">CPR Range</div></div>
      </div>
    `;
  }

  // List
  const listEl = document.getElementById('ammo-list');
  if (!filtered.length) {
    listEl.innerHTML = '<div class="empty-state">' + (ammo.length ? 'No purchases match the current filter.' : 'No ammo purchases logged yet.') + '</div>';
    return;
  }

  const sorted = [...filtered].sort((a, b) => (b.date || '').localeCompare(a.date || ''));
  listEl.innerHTML = sorted.map(a => {
    const cpr = a.quantity > 0 ? a.totalPrice / a.quantity : 0;
    const isUsedUp = (a.status || 'instock') === 'usedup';
    const name = [a.manufacturer, a.model].filter(Boolean).join(' ') || '(unnamed)';
    const seller = a.sellerId ? (data.sellers || []).find(s => s.id === a.sellerId) : null;
    const sellerLabel = seller ? seller.name : (a.sellerId ? 'Unknown seller' : '');
    return `
      <div class="ammo-card ${isUsedUp ? 'used-up' : ''}">
        <div class="ammo-card-header">
          <div style="flex:1;min-width:0;">
            <div class="ammo-caliber-badge">${a.caliber}</div>
            <div class="ammo-name">${name}</div>
          </div>
          <div>
            <div class="ammo-cpr">$${cpr.toFixed(3)}</div>
            <div class="ammo-cpr-label">per round</div>
          </div>
        </div>
        <div class="ammo-meta">
          <span>${(a.quantity || 0).toLocaleString()}</span> rds &nbsp;·&nbsp;
          <span>$${(a.totalPrice || 0).toFixed(2)}</span> &nbsp;·&nbsp;
          ${fmtDate(a.date)}${sellerLabel ? ` &nbsp;·&nbsp; <span>${sellerLabel}</span>` : ''} &nbsp;·&nbsp;
          <span class="ammo-status-pill ${isUsedUp ? 'usedup' : ''}">${isUsedUp ? 'Used up' : 'In stock'}</span>
        </div>
        ${a.notes ? `<div class="ammo-notes">${a.notes}</div>` : ''}
        <div class="ammo-actions">
          <button class="btn-mini" onclick="toggleAmmoStatus('${a.id}')">${isUsedUp ? 'Mark in stock' : 'Mark used up'}</button>
          <button class="btn-mini" onclick="openEditAmmo('${a.id}')">Edit</button>
          <button class="btn-mini" onclick="deleteAmmo('${a.id}')">Delete</button>
        </div>
      </div>
    `;
  }).join('');
}

  const rows = [['Date','Location','Firearm','Caliber','Rounds','Notes']];
  const sorted = [...data.sessions].sort((a,b) => a.date.localeCompare(b.date));
  sorted.forEach(s => {
    const loc = data.locations.find(l => l.id === s.locationId);
    Object.entries(s.rounds).forEach(([gid, r]) => {
      const gun = data.firearms.find(g => g.id === gid);
      rows.push([
        s.date,
        loc ? loc.name : '',
        gun ? gun.name : gid,
        gun ? gun.caliber : '',
        r,
        (s.notes || '').replace(/,/g,'')
      ]);
    });
  });
  const csv = rows.map(r => r.join(',')).join('\n');
  const blob = new Blob([csv], { type: 'text/csv' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `range-log-${today()}.csv`;
  a.click();
  URL.revokeObjectURL(url);
}

function importJSON(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const imported = JSON.parse(e.target.result);
      if (!imported.schemaVersion || !imported.firearms || !imported.sessions) {
        alert('Invalid backup file.'); return;
      }
      if (!confirm('This will replace all current data with the imported backup. Continue?')) return;
      data = migrateData(imported);
      save(data);
      renderAll();
      alert('Import successful!');
    } catch { alert('Could not read file. Make sure it is a valid Range Log JSON backup.'); }
  };
  reader.readAsText(file);
  input.value = '';
}

// ── INIT ──────────────────────────────────────────────────────────
function renderAll() {
  renderDashboard();
  renderLogForm();
  renderSessions();
  renderAmmo();
  renderSettings();
}

renderDashboard();
renderLogForm();
</script>
